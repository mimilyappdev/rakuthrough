<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RakuThrough — ラクスルー Ver.8.0</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* 以前の index 12.html のスタイルを完全継承 */
:root {
  --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
  --ink: #1a1a18; --ink2: #6b6a64; --ink3: #a8a79f;
  --accent: #1a56db; /* ★個人ボタンをロイヤルブルーに変更 */
  --accent-light: #e8f0fb;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; overflow-x: hidden; }

/* ヘッダー・ナビの表示バグ修正（重なり順を一番上に） */
.header { position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); z-index: 2000; padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
.nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--surface); z-index: 2000; display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(0,0,0,0.05); }

.view { display: none; padding: 20px; padding-bottom: 120px; min-height: 100vh; }
.view.active { display: block; }

/* 個人(青)・事業(黒) スイッチ */
.wallet-toggle { display: flex; background: var(--surface2); padding: 4px; border-radius: 12px; margin-bottom: 20px; }
.wallet-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: transparent; font-weight: 700; color: var(--ink2); cursor: pointer; }
.wallet-btn[data-wallet="personal"].active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(26, 86, 219, 0.3); }
.wallet-btn[data-wallet="business"].active { background: #1e1e1e; color: white; }

.category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.cat-btn { padding: 15px 5px; border-radius: 15px; border: 2px solid transparent; background: var(--surface); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: 700; cursor: pointer; }
.cat-btn.active { border-color: currentColor; }

.fab { position: fixed; right: 20px; bottom: calc(85px + env(safe-area-inset-bottom)); width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 30px; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 8px 20px rgba(26, 86, 219, 0.4); z-index: 2100; border: none; }
</style>
</head>
<body>

<header class="header">
  <div style="font-family:'Nunito'; font-weight:900; font-size:22px; color:var(--accent)">RakuThrough</div>
  <div style="font-size:12px; font-weight:700; color:var(--ink3)">Ver.8.0</div>
</header>

<main>
  <section id="main-view" class="view active">
    <div style="margin-bottom:30px">
      <div style="font-size:14px; color:var(--ink2)">今月の経費（暫定）</div>
      <div id="total-expense" style="font-family:'DM Mono'; font-size:36px; font-weight:500">¥ 0</div>
    </div>
    <div id="history-list" style="text-align:center; padding:40px; color:var(--ink3); font-size:13px;">履歴がありません</div>
  </section>

  <section id="input-view" class="view">
    <div class="wallet-toggle">
      <button class="wallet-btn active" data-wallet="personal" onclick="setWallet('personal')">個人</button>
      <button class="wallet-btn" data-wallet="business" onclick="setWallet('business')">事業</button>
    </div>
    <div class="category-grid" id="category-grid"></div>
    <div id="num-display" style="font-family:'DM Mono'; font-size:42px; text-align:right; padding:15px; background:var(--surface); border-radius:15px; margin-bottom:20px;">0</div>
    <button onclick="save()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:18px; font-size:18px; font-weight:700;">保存する</button>
    <button onclick="showView('main')" style="width:100%; margin-top:10px; background:none; border:none; color:var(--ink3); font-weight:700;">キャンセル</button>
  </section>

  <section id="settings-view" class="view">
    <div style="font-weight:700; margin-bottom:20px;">設定</div>
    <div style="background:var(--surface); border-radius:15px; padding:20px; color:var(--ink2); font-size:14px;">
      アプリバージョン: 8.0<br>
      データ保存先: ローカル
    </div>
    <button onclick="showView('main')" style="width:100%; margin-top:20px; padding:15px; background:var(--surface2); border:none; border-radius:15px; font-weight:700;">戻る</button>
  </section>
</main>

<nav class="nav-bar">
  <button onclick="showView('main')" style="background:none; border:none; font-size:22px;">🏠</button>
  <button onclick="showView('history')" style="background:none; border:none; font-size:22px;">📜</button>
  <button onclick="showView('settings')" style="background:none; border:none; font-size:22px;">⚙️</button>
</nav>

<button class="fab" id="main-fab" onclick="showView('input')">+</button>

<script>
const categories = [
  { id: 'sales', name: '売上高', color: '#3730a3', icon: '💰' },
  { id: 'outsource', name: '外注費', color: '#be185d', icon: '🎨' },
  { id: 'meeting', name: '会議費', color: '#15803d', icon: '☕' },
  { id: 'utilities', name: '光熱費', color: '#d97706', icon: '💡' },
  { id: 'supplies', name: '消耗品費', color: '#475569', icon: '📦' },
  { id: 'travel', name: '旅費交通費', color: '#c2410c', icon: '🚃' }
];

function init() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = categories.map(c => `
    <button class="cat-btn" id="cat-${c.id}" onclick="setCategory('${c.id}')" style="color:${c.color}">
      <span style="font-size:24px">${c.icon}</span>
      <span style="font-size:11px">${c.name}</span>
    </button>
  `).join('');
}

function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const target = document.getElementById(viewId + '-view');
  if(target) target.classList.add('active');
  document.getElementById('main-fab').style.display = (viewId === 'main') ? 'flex' : 'none';
  window.scrollTo(0, 0);
}

function setWallet(w) {
  document.querySelectorAll('.wallet-btn').forEach(b => b.classList.toggle('active', b.dataset.wallet === w));
}

function setCategory(id) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.id === 'cat-' + id));
}

function save() { alert('保存しました'); showView('main'); }

window.onload = init;
</script>
</body>
</html>
